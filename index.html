<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบข้อมูลสินค้า CK Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="แคตตาล็อกสินค้าพรีเมียม CK Premium - ตรวจสอบข้อมูลสินค้าและราคาล่าสุด">
    <meta property="og:title" content="ระบบข้อมูลสินค้า CK Premium">
    <meta property="og:description" content="แคตตาล็อกสินค้าพรีเมียม - ตรวจสอบข้อมูลสินค้าและราคาล่าสุด">
    <meta property="og:image" content="https://chatinont.github.io/ck-premium/icon-512.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chatinont.github.io/ck-premium/">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E67E22">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NCK254ZCX2"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-NCK254ZCX2');
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CK Premium">
    <link rel="apple-touch-icon" href="icon-512.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Failed', err));
            });

            // v30: Auto-Reload when new version is detected
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                window.location.reload();
                refreshing = true;
            });
        }
    </script>
</head>

<body>
    <div class="app-container">
        <header class="header blur-backdrop">
            <div class="header-content">
                <div class="logo">
                    <img src="icon-512.png" alt="CK Premium Logo" class="logo-icon-img">
                    <h1>CK Premium <span class="accent-text">Catalogue</span></h1>
                </div>
                <div class="header-contact">
                    <a href="https://m.me/ckprintingth" target="_blank" class="contact-link fb">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 2C6.477 2 2 6.145 2 11.258c0 2.908 1.454 5.494 3.727 7.178V22l3.393-1.862c.846.235 1.743.36 2.68.36 5.523 0 10-4.145 10-9.258C21.8 6.145 17.523 2 12 2zm1.09 13l-2.433-2.603-4.75 2.603 5.225-5.552 2.493 2.603 4.69-2.603-5.225 5.552z" />
                        </svg>
                        <span>Inbox</span>
                    </a>
                    <a href="https://line.me/R/ti/p/@ckprinting" target="_blank" class="contact-link line">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.121.303.079.778.039 1.085l-.171 1.047c-.052.303-.242 1.185 1.039.646 1.281-.539 6.911-4.067 9.428-6.967 1.739-1.907 2.571-3.951 2.571-6.021zm-16.711 3.541c-.422 0-.763-.341-.763-.763v-4.136c0-.422.341-.763.763-.763s.763.342.763.763v4.136c0 .422-.341.763-.763.763zm4.551 0c-.422 0-.763-.341-.763-.763v-4.136c0-.422.341-.763.763-.763s.763.342.763.763v4.136c0 .422-.341.763-.763.763zm.74-4.899v4.136c0 .422.341.763.763.763s.763-.341.763-.763v-4.136c0-.422-.341-.763-.763-.763s-.763.341-.763.763zm6.32 4.899c-.422 0-.763-.341-.763-.763v-4.136c0-.422.341-.763.763-.763s.763.342.763.763v4.136c0 .422-.341.763-.763.763zm-4.47-2.068l1.63-1.63c.3-.3.785-.3 1.085 0s.3.785 0 1.085l-1.63 1.63c-.3.3-.785.3-1.085 0s-.3-.785 0-1.085zm.542 1.085l1.63 1.63c.3.3.785.3 1.085 0s.3-.785 0-1.085l-1.63-1.63c-.3-.3-.785-.3-1.085 0s-.3.785 0 1.085z" />
                        </svg>
                        <span>Line OA</span>
                    </a>
                </div>
                <div class="view-count-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <span id="view-count-value">...</span>
                </div>
                <div class="search-container">
                    <svg class="search-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="ค้นหารหัสสินค้า หรือ ชื่อสินค้า...">
                </div>
            </div>
    </div>
    </header>

    <main class="main-content">
        <div class="controls-bar">
            <div class="results-count">พบสินค้าทั้งหมด <span id="totalItems">0</span> รายการ</div>

            <div class="filter-bar">
                <div class="custom-multiselect" id="capacityMultiselect">
                    <div class="multiselect-trigger">
                        <span>ความจุทั้งหมด</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="3">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                    <div class="multiselect-options" id="capacityOptions">
                        <!-- Options will be injected here -->
                    </div>
                </div>
                <div class="custom-multiselect" id="retailMultiselect">
                    <div class="multiselect-trigger">
                        <span>ราคาปลีกทั้งหมด</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="3">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                    <div class="multiselect-options" id="retailOptions"></div>
                </div>
                <div class="custom-multiselect" id="wholesaleMultiselect">
                    <div class="multiselect-trigger">
                        <span>ราคาส่งทั้งหมด (100 ใบขึ้นไป)</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="3">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                    <div class="multiselect-options" id="wholesaleOptions"></div>
                </div>
                <button id="clearFiltersBtn" class="btn-clear" title="ล้างฟิลเตอร์ทั้งหมด">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"></path>
                    </svg>
                    <span>ล้าง</span>
                </button>
            </div>

            <div class="view-toggle">
                <button id="grid-view-btn" class="active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                </button>
                <button id="list-view-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                </button>

                <button id="export-btn" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Export
                </button>
            </div>
        </div>

        <div id="product-container" class="product-grid">
            <!-- Data will be injected here via JS -->
        </div>
    </main>
    </div>


    <!-- Image Zoom Modal -->
    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImg">
        <div id="caption"></div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <div style="text-align: center; padding: 20px; color: #999; font-size: 0.8rem;">Update v34</div>
    <script src="script.js"></script>
</body>

</html>
