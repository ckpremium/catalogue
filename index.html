<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบข้อมูลสินค้า CK Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="แคตตาล็อกสินค้าพรีเมียม CK Premium - ตรวจสอบข้อมูลสินค้าและราคาล่าสุด">
    <meta property="og:title" content="ระบบข้อมูลสินค้า CK Premium">
    <meta property="og:description" content="แคตตาล็อกสินค้าพรีเมียม - ตรวจสอบข้อมูลสินค้าและราคาล่าสุด">
    <meta property="og:image" content="https://chatinont.github.io/ck-premium/icon-512.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chatinont.github.io/ck-premium/">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E67E22">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CK Premium">
    <link rel="apple-touch-icon" href="icon-512.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>
</head>

<body>
    <div class="app-container">
        <header class="header blur-backdrop">
            <div class="header-content">
                <div class="logo">
                    <img src="icon-512.png" alt="CK Premium Logo" class="logo-icon-img">
                    <h1>CK Premium <span class="accent-text">Catalogue</span></h1>
                </div>
                <div class="search-container">
                    <svg class="search-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="ค้นหารหัสสินค้า หรือ ชื่อสินค้า...">
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="controls-bar">
                <div class="results-count">พบสินค้าทั้งหมด <span id="totalItems">0</span> รายการ</div>

                <div class="filter-bar">
                    <div class="custom-multiselect" id="capacityMultiselect">
                        <div class="multiselect-trigger">
                            <span>ความจุทั้งหมด</span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="3">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <div class="multiselect-options" id="capacityOptions">
                            <!-- Options will be injected here -->
                        </div>
                    </div>
                    <div class="custom-multiselect" id="retailMultiselect">
                        <div class="multiselect-trigger">
                            <span>ราคาปลีกทั้งหมด</span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="3">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <div class="multiselect-options" id="retailOptions"></div>
                    </div>
                    <div class="custom-multiselect" id="wholesaleMultiselect">
                        <div class="multiselect-trigger">
                            <span>ราคาส่งทั้งหมด (100 ใบขึ้นไป)</span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="3">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <div class="multiselect-options" id="wholesaleOptions"></div>
                    </div>
                    <button id="clearFiltersBtn" class="btn-clear" title="ล้างฟิลเตอร์ทั้งหมด">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12"></path>
                        </svg>
                        <span>ล้าง</span>
                    </button>
                </div>

                <div class="view-toggle">
                    <button id="grid-view-btn" class="active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                    </button>
                    <button id="list-view-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                        </svg>
                    </button>

                    <button id="export-btn" class="btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Export
                    </button>
                </div>
            </div>

            <div id="product-container" class="product-grid">
                <!-- Data will be injected here via JS -->
            </div>
        </main>
    </div>


    <script src="script.js"></script>
</body>

</html>
